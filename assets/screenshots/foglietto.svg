<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="title">
  <title id="title">Informazioni del foglietto illustrativo in Farmaco Scan</title>
  <rect width="390" height="844" rx="42" fill="#f8fbf9"/>
  <rect width="390" height="48" rx="42" fill="#ffffff"/>
  <text x="26" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#17201b">09:41</text>
  <rect x="158" y="10" width="74" height="22" rx="11" fill="#111813"/>
  <rect y="48" width="390" height="104" fill="#17834a"/>
  <text x="24" y="84" font-family="Arial,sans-serif" font-size="14" fill="#d6f3e2">Foglietto illustrativo</text>
  <text x="24" y="118" font-family="Arial,sans-serif" font-size="25" font-weight="800" fill="#fff">TACHIPIRINA 500 mg</text>
  <text x="24" y="141" font-family="Arial,sans-serif" font-size="12" fill="#d6f3e2">Informazioni disponibili per il medicinale</text>
  <g transform="translate(20 176)">
    <rect width="350" height="70" rx="18" fill="#fff" stroke="#dce7df"/>
    <circle cx="34" cy="35" r="19" fill="#eaf7f0"/>
    <text x="34" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17834a">1</text>
    <text x="66" y="31" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17201b">Che cos'è e a cosa serve</text>
    <text x="66" y="51" font-family="Arial,sans-serif" font-size="12" fill="#5d6961">Consulta la sezione del foglietto</text>
  </g>
  <g transform="translate(20 260)">
    <rect width="350" height="70" rx="18" fill="#fff" stroke="#dce7df"/>
    <circle cx="34" cy="35" r="19" fill="#eaf7f0"/>
    <text x="34" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17834a">2</text>
    <text x="66" y="31" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17201b">Cosa sapere prima dell'uso</text>
    <text x="66" y="51" font-family="Arial,sans-serif" font-size="12" fill="#5d6961">Avvertenze e precauzioni disponibili</text>
  </g>
  <g transform="translate(20 344)">
    <rect width="350" height="70" rx="18" fill="#fff" stroke="#dce7df"/>
    <circle cx="34" cy="35" r="19" fill="#eaf7f0"/>
    <text x="34" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17834a">3</text>
    <text x="66" y="31" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17201b">Come usare il medicinale</text>
    <text x="66" y="51" font-family="Arial,sans-serif" font-size="12" fill="#5d6961">Leggi le indicazioni riportate nel foglietto</text>
  </g>
  <g transform="translate(20 428)">
    <rect width="350" height="70" rx="18" fill="#fff" stroke="#dce7df"/>
    <circle cx="34" cy="35" r="19" fill="#eaf7f0"/>
    <text x="34" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17834a">4</text>
    <text x="66" y="31" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17201b">Possibili effetti indesiderati</text>
    <text x="66" y="51" font-family="Arial,sans-serif" font-size="12" fill="#5d6961">Consulta le informazioni disponibili</text>
  </g>
  <g transform="translate(20 512)">
    <rect width="350" height="70" rx="18" fill="#fff" stroke="#dce7df"/>
    <circle cx="34" cy="35" r="19" fill="#eaf7f0"/>
    <text x="34" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17834a">5</text>
    <text x="66" y="31" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#17201b">Come conservare il medicinale</text>
    <text x="66" y="51" font-family="Arial,sans-serif" font-size="12" fill="#5d6961">Indicazioni presenti nel foglietto illustrativo</text>
  </g>
  <rect x="20" y="616" width="350" height="134" rx="20" fill="#fff9ec" stroke="#f1d9a7"/>
  <text x="44" y="650" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#66572f">Avvertenza importante</text>
  <text x="44" y="677" font-family="Arial,sans-serif" font-size="12" fill="#66572f">Farmaco Scan non sostituisce il medico,</text>
  <text x="44" y="698" font-family="Arial,sans-serif" font-size="12" fill="#66572f">il farmacista o il foglietto allegato alla confezione.</text>
  <text x="44" y="726" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#66572f">In caso di dubbi, chiedi a un professionista.</text>
</svg>
